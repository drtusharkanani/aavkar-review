<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Doctor Review">
<title>Share Your Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --teal: #0a7c6e;
    --teal-light: #0fa390;
    --teal-pale: #e8f7f5;
    --gold: #c9993a;
    --gold-light: #f5e6c8;
    --navy: #0d2340;
    --text: #1a2e3b;
    --muted: #6b8191;
    --white: #ffffff;
    --bg: #f4f9f8;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(10,124,110,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HERO ── */
  .hero {
    width: 100%;
    background: linear-gradient(145deg, var(--navy) 0%, #104a5e 60%, var(--teal) 100%);
    padding: 36px 20px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    top: -80px; right: -80px;
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(201,153,58,0.08);
    bottom: -60px; left: -40px;
    pointer-events: none;
  }
  .cross-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: var(--gold);
    border-radius: 50%;
    margin-bottom: 14px;
    font-size: 22px;
    position: relative; z-index: 1;
    box-shadow: 0 0 0 8px rgba(201,153,58,0.18);
  }
  .hospital-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 5vw, 28px);
    color: #fff;
    letter-spacing: 0.3px;
    line-height: 1.2;
    position: relative; z-index: 1;
  }
  .hospital-sub {
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2.5px;
    margin: 5px 0 2px;
    font-weight: 500;
    position: relative; z-index: 1;
  }
  .divider-gold {
    width: 48px; height: 2px;
    background: var(--gold);
    margin: 12px auto 12px;
    border-radius: 2px;
    position: relative; z-index: 1;
  }
  .doctor-card {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50px;
    padding: 8px 18px 8px 10px;
    margin-top: 4px;
    position: relative; z-index: 1;
    backdrop-filter: blur(6px);
  }
  .doctor-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white; font-size: 13px;
    flex-shrink: 0;
  }
  .doctor-info { text-align: left; }
  .doctor-name-text { font-size: 13px; font-weight: 600; color: #fff; }
  .doctor-title-text { font-size: 10.5px; color: rgba(255,255,255,0.65); margin-top: 1px; }

  /* info badges below doctor card */
  .hero-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 12px;
    position: relative; z-index: 1;
  }
  .hero-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.3px;
  }

  /* ── MAIN CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 20px;
    width: calc(100% - 32px);
    max-width: 480px;
    margin: -20px auto 0;
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    position: relative;
    z-index: 2;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 14px;
  }

  /* ── TAGS ── */
  .tags-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tag {
    padding: 8px 14px;
    border-radius: 50px;
    border: 1.5px solid #d4e8e5;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: var(--teal);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .tag:hover { background: var(--teal-pale); border-color: var(--teal); }
  .tag.active {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
    box-shadow: 0 2px 12px rgba(10,124,110,0.28);
    transform: translateY(-1px);
  }
  .tag .emoji { font-size: 15px; }

  /* special info tags (degree/city) */
  .tag.info-tag {
    border-color: var(--gold);
    color: #8a6010;
    background: var(--gold-light);
  }
  .tag.info-tag.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
    box-shadow: 0 2px 12px rgba(201,153,58,0.35);
  }

  /* ── REVIEW BOX ── */
  .review-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .review-label span { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 600; }
  .char-count { font-size: 11px; color: var(--muted); }
  .lang-badge {
    display: none;
    font-size: 10.5px;
    font-weight: 600;
    background: var(--gold-light);
    color: #8a6010;
    border: 1px solid #e8c87a;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  textarea {
    width: 100%;
    min-height: 130px;
    border: 1.5px solid #d4e8e5;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
    background: #fafdfc;
  }
  textarea:focus { border-color: var(--teal); background: #fff; }
  textarea::placeholder { color: #b0c4be; }

  /* ── SUBMIT ── */
  .submit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 18px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 16px rgba(10,124,110,0.30);
    text-decoration: none;
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(10,124,110,0.38); }
  .submit-btn:active { transform: translateY(0); }
  .hint { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

  /* ── QR SECTION ── */
  .qr-section {
    margin: 16px auto 0;
    width: calc(100% - 32px);
    max-width: 480px;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 20px;
    text-align: center;
    animation: fadeUp 0.4s ease 0.1s both;
  }
  .qr-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--navy); margin-bottom: 4px; }
  .qr-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  #qrcode { display: inline-block; padding: 12px; background: white; border-radius: 10px; border: 1.5px solid #d4e8e5; }
  #qrcode img, #qrcode canvas { border-radius: 6px; }
  .qr-url { font-size: 11px; color: var(--teal); margin-top: 10px; word-break: break-all; }

  /* ── OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,20,40,0.88);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(6px);
  }
  .overlay.show { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  /* STEP 1 CARD — Copy confirmation */
  .overlay-card {
    background: white;
    border-radius: 28px 28px 0 0;
    padding: 28px 22px 32px;
    width: 100%;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
    animation: slideUp 0.35s cubic-bezier(.34,1.3,.64,1);
  }
  @keyframes slideUp {
    from { transform:translateY(100%); }
    to   { transform:translateY(0); }
  }

  /* drag handle */
  .drag-handle {
    width: 40px; height: 4px;
    background: #ddd; border-radius: 4px;
    margin: 0 auto 20px;
  }

  /* review text tap-to-copy box */
  .review-tap-box {
    background: #f0f9f7;
    border: 2px solid var(--teal);
    border-radius: 14px;
    padding: 14px 16px;
    margin: 0 0 6px;
    text-align: left;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .review-tap-box:active { background: #d4ede9; }
  .review-tap-box .tap-label {
    position: absolute;
    top: -11px; left: 50%; transform: translateX(-50%);
    background: var(--teal);
    color: white;
    font-size: 10px; font-weight: 700;
    padding: 3px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .review-tap-box .review-text {
    font-size: 13px; color: var(--text); line-height: 1.6;
    max-height: 80px; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .copy-confirm {
    font-size: 11px; color: var(--muted); margin-bottom: 20px; text-align: center;
  }
  .copy-confirm span { color: var(--teal); font-weight: 600; }

  /* animated paste visual */
  .paste-visual {
    margin: 4px auto 18px;
    width: 100%;
    background: var(--teal-pale);
    border-radius: 14px;
    padding: 16px 12px 12px;
    position: relative;
    overflow: hidden;
  }
  .paste-visual-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--teal); margin-bottom: 12px;
  }
  .paste-steps-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .paste-step-box {
    background: white;
    border-radius: 10px;
    padding: 10px 8px;
    flex: 1;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border: 1.5px solid #d4e8e5;
  }
  .paste-step-icon {
    font-size: 24px;
    display: block;
    margin-bottom: 4px;
    animation: bounce 1.5s infinite;
  }
  .paste-step-box:nth-child(3) .paste-step-icon { animation-delay: 0.5s; }
  .paste-step-box:nth-child(5) .paste-step-icon { animation-delay: 1s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .paste-step-label {
    font-size: 10.5px; font-weight: 600; color: var(--navy); line-height: 1.3;
  }
  .paste-arrow { font-size: 18px; color: var(--teal); flex-shrink: 0; }

  /* I CONFIRMED button — locked until copy confirmed */
  .confirm-copy-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #34a853, #1e9e46);
    color: white; border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(52,168,83,0.4);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    position: relative; overflow: hidden;
  }
  .confirm-copy-btn:disabled {
    background: #b0c4be;
    box-shadow: none;
    cursor: not-allowed;
  }
  .confirm-copy-btn:not(:disabled):active { transform: scale(0.98); }
  .confirm-copy-btn .prog {
    position: absolute; left:0; top:0; bottom:0;
    background: rgba(255,255,255,0.2);
    transition: width 1s linear;
    border-radius: 14px;
  }
  .confirm-copy-btn .btn-label { position: relative; z-index:1; }

  /* pulse ring on button */
  @keyframes pulseRing {
    0% { box-shadow: 0 4px 20px rgba(52,168,83,0.4); }
    50% { box-shadow: 0 4px 30px rgba(52,168,83,0.7), 0 0 0 8px rgba(52,168,83,0.15); }
    100% { box-shadow: 0 4px 20px rgba(52,168,83,0.4); }
  }
  .confirm-copy-btn.pulse { animation: pulseRing 1.5s infinite; }

  .cancel-link { display: block; margin-top: 14px; font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; }

  /* STEP 2 — full screen paste reminder shown AFTER Google opens (when user comes back) */
  .return-banner {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,20,40,0.92);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(8px);
  }
  .return-banner.show { display: flex; }
  .return-card {
    background: white;
    border-radius: 24px;
    padding: 32px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .big-paste-icon {
    font-size: 64px;
    display: block;
    margin-bottom: 12px;
    animation: wiggle 1s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }
  .big-paste-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px; color: var(--navy); margin-bottom: 8px;
  }
  .big-paste-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .big-paste-instruction {
    background: var(--navy);
    color: white;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 20px;
    font-size: 18px; font-weight: 700;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }
  .big-paste-instruction span { color: var(--gold); }
  .done-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: white; border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 16px rgba(10,124,110,0.3);
  }
  .retry-link { display: block; margin-top: 12px; font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; }

  /* ── NOT FOUND ── */
  .not-found {
    text-align: center;
    padding: 60px 24px;
    max-width: 380px;
    margin: 40px auto;
  }
  .not-found .icon { font-size: 48px; margin-bottom: 16px; }
  .not-found h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--navy); margin-bottom: 10px; }
  .not-found p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: white;
    padding: 12px 22px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  footer { text-align: center; font-size: 11px; color: #aac3be; padding: 20px 16px 32px; }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="cross-icon">✚</div>
  <div class="hospital-sub" id="heroHospital" style="display:none"></div>
  <h1 class="hospital-name" id="heroHospitalName">Loading...</h1>
  <div class="divider-gold"></div>
  <div class="doctor-card">
    <div class="doctor-avatar" id="heroAvatar">--</div>
    <div class="doctor-info">
      <div class="doctor-name-text" id="heroDoctorName">Loading...</div>
      <div class="doctor-title-text" id="heroDoctorTitle">Loading...</div>
    </div>
  </div>
  <div class="hero-badges" id="heroBadges"></div>
</div>

<!-- MAIN CARD -->
<div class="card" id="mainCard">
  <!-- TAGS -->
  <div class="section-label">Pick what describes your visit</div>
  <div class="tags-grid" id="tagsGrid"></div>

  <!-- REVIEW TEXT -->
  <div class="review-label">
    <span>Your Review</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="lang-badge" id="langBadge"></span>
      <span class="char-count" id="charCount">0 / 500</span>
    </div>
  </div>
  <textarea id="reviewBox" maxlength="500" placeholder="Select tags above to auto-generate your review, or type your own…"></textarea>

  <!-- SUBMIT -->
  <button class="submit-btn" id="submitBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1M8 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M8 5a2 2 0 0 0-1-1h6a2 2 0 0 1 1 1m0 0h2a2 2 0 0 1 2 2v3"/>
    </svg>
    <span id="submitBtnText">Copy Review for Google</span>
  </button>
  <p class="hint" id="submitHint">Tap to copy → Google opens → Long press &amp; Paste ✓</p>
</div>

<!-- QR SECTION -->
<div class="qr-section">
  <div class="qr-title">Share This Page</div>
  <div class="qr-sub">Scan QR code to open on any device</div>
  <div id="qrcode"></div>
  <div class="qr-url" id="pageUrl"></div>
</div>

<footer id="footerText">Powered by GoodReview Team · goodreview.in</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  ██████╗  ██████╗  ██████╗████████╗ ██████╗ ██████╗
//  ██╔══██╗██╔═══██╗██╔════╝╚══██╔══╝██╔═══██╗██╔══██╗
//  ██║  ██║██║   ██║██║        ██║   ██║   ██║██████╔╝
//  ██║  ██║██║   ██║██║        ██║   ██║   ██║██╔══██╗
//  ██████╔╝╚██████╔╝╚██████╗   ██║   ╚██████╔╝██║  ██║
//  ╚═════╝  ╚═════╝  ╚═════╝   ╚═╝    ╚═════╝ ╚═╝  ╚═╝
//
//  ADD / EDIT DOCTORS BELOW
//  URL to use: yoursite.com/?id=101
// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
//  AIRTABLE CONFIGURATION
// ═══════════════════════════════════════════════════════
const AIRTABLE_TOKEN   = 'patudFcQ5799EkkZ0.af77c9f9a3a45f2d66482db161ceca865c58003ac745d06104769e9a6ab2e602';
const AIRTABLE_BASE_ID = 'apppCUPgl9647WTMY';
const AIRTABLE_TABLE   = 'Doctors';

// ═══════════════════════════════════════════════════════
//  LOAD DOCTOR FROM AIRTABLE
// ═══════════════════════════════════════════════════════
const params   = new URLSearchParams(window.location.search);
const doctorId = params.get('id') || '101';
let DOC        = null;

async function loadDoctor() {
  try {
    // Show loading state
    document.getElementById('heroDoctorName').textContent = 'Loading...';
    document.getElementById('heroHospitalName').textContent = 'GoodReview';

    // Fetch from Airtable — filter by DoctorID
    const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}?filterByFormula=${encodeURIComponent(`{DoctorID}=${doctorId}`)}&maxRecords=1`;

    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
    });

    if (!res.ok) throw new Error('API error: ' + res.status);

    const data = await res.json();

    if (!data.records || data.records.length === 0) {
      showNotFound();
      return;
    }

    const r = data.records[0].fields;

    // Check if Active (handles boolean true, string "true", string "Yes", number 1)
    const isActive = r.Active === true || r.Active === 'true' || r.Active === 'Yes' || r.Active === 1 || r.Active === '1';
    if (!isActive) {
      showExpired();
      return;
    }

    // Check if expired
    if (r.ExpiryDate) {
      const expiry = new Date(r.ExpiryDate);
      const today  = new Date();
      if (expiry < today) {
        showExpired();
        return;
      }
    }

    // Build DOC object from Airtable fields
    DOC = {
      name:       r.DoctorName   || 'Doctor',
      degree:     r.Degree       || '',
      specialty:  r.Specialty    || 'general_physician',
      city:       r.City         || '',
      hospital:   r.Hospital     || '',
      plan:       r.Plan         || 'free',
      gmb:        r.GMB          || '',
      customTags: parseCustomTags(r.CustomTags),
    };

    initApp();

  } catch(err) {
    console.error('Airtable error:', err);
    // Fallback to hardcoded if API fails
    DOC = FALLBACK_DOCTORS[doctorId];
    if (DOC) {
      initApp();
    } else {
      showNotFound();
    }
  }
}

function parseCustomTags(raw) {
  if (!raw) return [];
  try { return JSON.parse(raw); } catch(e) { return []; }
}

function showNotFound() {
  document.getElementById('mainCard').innerHTML = `
    <div class="not-found">

}

// ═══════════════════════════════════════════════════════
//  GET TAGS FOR A DOCTOR
// ═══════════════════════════════════════════════════════
function getTagsForDoctor(doc) {
  const specialtyTags = SPECIALTY_TAGS[doc.specialty] || [];
  const customTags = (doc.customTags || []).map(t => ({
    key:   'custom_' + t.label.toLowerCase().replace(/\s+/g, '_'),
    emoji: t.emoji || '🏷️',
    label: t.label,
    custom: true
  }));
  return [...QUALITY_TAGS, ...specialtyTags, ...customTags];
}

function initApp() {
  // ── Fill Hero ──
  const initials = DOC.name.split(' ').filter(w => w.match(/[A-Z]/)).slice(-2).map(w => w[0]).join('');
  document.getElementById('heroHospital').textContent = DOC.hospital;
  document.getElementById('heroHospitalName').textContent = DOC.hospital;
  document.getElementById('heroAvatar').textContent = initials || 'DR';
  document.getElementById('heroDoctorName').textContent = DOC.name;
  document.getElementById('heroDoctorTitle').textContent = DOC.degree + ' · ' + DOC.specialty;
  document.getElementById('footerText').textContent = DOC.hospital + ' · ' + DOC.city;

  // ── Hero badges ──
  const badgesEl = document.getElementById('heroBadges');
  badgesEl.innerHTML = `
    <span class="hero-badge">🎓 ${DOC.degree}</span>
    <span class="hero-badge">📍 ${DOC.city}</span>
  `;

  // ── Build Tags ──
  const grid = document.getElementById('tagsGrid');
  grid.innerHTML = '';

  // Degree tag
  const degTag = document.createElement('div');
  degTag.className = 'tag info-tag';
  degTag.dataset.tag = 'degree';
  degTag.innerHTML = `<span class="emoji">🎓</span> ${DOC.degree}`;
  grid.appendChild(degTag);

  // City tag
  const cityTag = document.createElement('div');
  cityTag.className = 'tag info-tag';
  cityTag.dataset.tag = 'city';
  cityTag.innerHTML = `<span class="emoji">📍</span> ${DOC.city}`;
  grid.appendChild(cityTag);

  // Specialty + custom tags
  const allTags = getTagsForDoctor(DOC);
  allTags.forEach(t => {
    const el = document.createElement('div');
    el.className = t.custom ? 'tag info-tag' : 'tag';
    el.dataset.tag = t.key;
    el.dataset.label = t.label;
    el.innerHTML = `<span class="emoji">${t.emoji}</span> ${t.label}`;
    grid.appendChild(el);
  });

  // Tag click events
  let selectedTags = [];
  document.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      tag.classList.toggle('active');
      const t = tag.dataset.tag;
      if (selectedTags.includes(t)) {
        selectedTags = selectedTags.filter(x => x !== t);
      } else {
        selectedTags.push(t);
      }
      generateReview(selectedTags);
    });
  });

  // ── QR Code ──
  const pageURL = window.location.href.split('#')[0];
  document.getElementById('pageUrl').textContent = pageURL;
  new QRCode(document.getElementById('qrcode'), {
    text: pageURL,
    width: 160, height: 160,
    colorDark: "#0d2340",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });

  // ═══ SUBMIT — copy + show 2s message + open GMB ═══
  document.getElementById('submitBtn').addEventListener('click', function() {
    const text = document.getElementById('reviewBox').value.trim();
    if (!text) { showToast('⚠️ Please select tags or write a review first'); return; }

    // Copy to clipboard
    copyToClipboard(text);

    // Change button to "Copied! Now Paste" for 2 seconds
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('submitBtnText');
    const hint = document.getElementById('submitHint');

    btn.style.background = 'linear-gradient(135deg, #27ae60, #1e8449)';
    btnText.textContent = '✅ Copied! Now Paste on Google';
    hint.textContent = 'Opening Google in 2 seconds...';
    hint.style.color = '#27ae60';
    hint.style.fontWeight = '600';

    // After 2 seconds — open Google
    setTimeout(() => {
      const baseGmb = DOC.gmb.split('&text=')[0];
      const gmbWithText = baseGmb + '&rating=5&text=' + encodeURIComponent(text);
      window.open(gmbWithText, '_blank');

      // Reset button after opening
      setTimeout(() => {
        btn.style.background = '';
        btnText.textContent = 'Copy Review for Google';
        hint.textContent = 'Tap to copy → Google opens → Long press & Paste ✓';
        hint.style.color = '';
        hint.style.fontWeight = '';
      }, 1000);
    }, 2000);
  });
}

function buildTemplates(doc) {
  const N  = doc.name;       // Full name e.g. "Dr. Tushar Kanani"
  const H  = doc.hospital;   // Hospital name
  const C  = doc.city;       // City
  const D  = doc.degree;     // Degree
  const SP = doc.specialty;  // Specialty

  return {
    english: {
      label: "🇬🇧 English",
      base: [
        `I visited ${H} and had a truly wonderful experience with ${N}.`,
        `My visit to ${H} was excellent. ${N} is an outstanding doctor.`,
        `I am so glad I chose ${H} in ${C}. ${N} gave me the best medical care.`,
        `Had a great experience at ${H}. ${N} is an exceptional doctor.`
      ],
      phrases: {
        degree:             `${N} is a highly qualified ${D} specialist`,
        city:               `this is the best hospital in ${C}`,
        excellent_doctor:   `${N} is simply an excellent doctor`,
        accurate_diagnosis: `the diagnosis by ${N} was spot-on and very accurate`,
        very_caring:        `${N} is extremely caring and empathetic towards every patient`,
        knowledgeable:      `the medical knowledge and expertise of ${N} are truly impressive`,
        explained_clearly:  `${N} explained everything in very simple and clear language`,
        clean_hospital:     `${H} is very clean and well-maintained`,
        friendly_staff:     `the staff at ${H} is friendly, helpful, and always welcoming`,
        quick_service:      `the service was quick with no long waiting times`,
        good_followup:      `the follow-up care from ${N} was excellent`,
        highly_recommended: `I highly recommend ${N} to everyone`,
        affordable_fees:    `the fees are very reasonable and affordable`,
        best_in_city:       `${N} is truly the best doctor in ${C}`,
        diabetes:           `${N} managed my diabetes with great expertise and care`,

const langKeys = ['english', 'hindi', 'hinglish', 'gujarati'];
let lastLangIndex = -1;

function pickLang(templates) {
  let idx;
  do { idx = Math.floor(Math.random() * langKeys.length); } while (idx === lastLangIndex);
  lastLangIndex = idx;
  return templates[langKeys[idx]];
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateReview(selectedTags) {
  const reviewBox = document.getElementById('reviewBox');
  if (!DOC || selectedTags.length === 0) {
    reviewBox.value = '';
    document.getElementById('langBadge').style.display = 'none';
    updateCount();
    return;
  }

  const templates = buildTemplates(DOC);
  const lang = pickLang(templates);
  const base    = rand(lang.base);
  const closing = rand(lang.closing);

  // For each tag: use phrase from template, or fall back to tag label naturally
  const phrases = selectedTags.map(t => {
    if (lang.phrases[t]) return lang.phrases[t];
    // Custom tag fallback — use the label text naturally
    const tagEl = document.querySelector(`[data-tag="${t}"]`);
    if (tagEl) {
      const label = tagEl.dataset.label || tagEl.textContent.trim();
      return `${DOC.name} provided excellent care for ${label}`;
    }
    return null;
  }).filter(Boolean);

  if (phrases.length === 0) {
    reviewBox.value = base + ' ' + closing;
  } else {
    let middle = '';
    if (phrases.length === 1) {
      middle = ' ' + phrases[0].charAt(0).toUpperCase() + phrases[0].slice(1) + '.';
    } else if (phrases.length <= 3) {
      const joined = phrases.slice(0,-1).join(', ') + ', and ' + phrases[phrases.length-1];
      middle = ' ' + joined.charAt(0).toUpperCase() + joined.slice(1) + '.';
    } else {
      const half = Math.ceil(phrases.length / 2);
      const s1 = phrases.slice(0, half).join(', ');
      const s2 = phrases.slice(half).join(', ');
      middle = ' ' + s1.charAt(0).toUpperCase() + s1.slice(1) + '. Also, ' + s2 + '.';
    }
    reviewBox.value = base + middle + ' ' + closing;
  }

  const badge = document.getElementById('langBadge');
  badge.textContent = lang.label;
  badge.style.display = 'inline-block';

  updateCount();
}

const reviewBox = document.getElementById('reviewBox');
function updateCount() {
  document.getElementById('charCount').textContent = reviewBox.value.length + ' / 500';
}
reviewBox.addEventListener('input', updateCount);

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  } catch(e) {}
}

let countdownTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

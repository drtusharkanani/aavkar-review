<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GoodReview</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--saffron:#FF6B00;--saffron-light:#FFF3E8;--green:#1A7A4A;--green-light:#E8F5EE;--gold:#F5A623;--text:#1A1A2E;--text-soft:#5A5A7A;--border:#E8E8F0;--bg:#F7F7FC;--white:#FFFFFF;--shadow:0 2px 16px rgba(0,0,0,0.08);--radius:16px;--tag-radius:24px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
.header{background:linear-gradient(135deg,#FF6B00 0%,#FF8C00 50%,#F5A623 100%);padding:28px 20px 52px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,0.08);border-radius:50%}
.header::after{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;background:rgba(255,255,255,0.06);border-radius:50%}
.brand{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.business-name{font-family:'Poppins',sans-serif;font-size:24px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:4px}
.business-sub{font-size:13px;color:rgba(255,255,255,0.85);font-weight:500}
.stars-row{display:flex;justify-content:center;gap:4px;margin-top:10px}
.card{background:var(--white);border-radius:var(--radius);margin:-28px 14px 12px;padding:18px;box-shadow:var(--shadow);position:relative;z-index:1;animation:fadeIn 0.35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.section-title .icon{font-size:17px}

/* LANGUAGE */
.lang-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.lang-btn{padding:8px 15px;border-radius:var(--tag-radius);border:2px solid var(--border);background:var(--white);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-soft);cursor:pointer;transition:all 0.18s}
.lang-btn:hover{border-color:var(--saffron);color:var(--saffron)}
.lang-btn.selected{background:var(--saffron);border-color:var(--saffron);color:#fff}
.lang-skip{font-size:12px;color:var(--text-soft);text-align:center;cursor:pointer;padding:5px;text-decoration:underline;display:block}
.lang-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
.lang-badge.locked{background:#E8F5EE;color:var(--green)}
.lang-badge.auto{background:#FFF3E8;color:var(--saffron)}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:7px}
.tag-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--tag-radius);border:2px solid var(--border);background:var(--white);font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.15s;user-select:none}
.tag-pill:hover{border-color:var(--saffron);background:var(--saffron-light)}
.tag-pill.selected{background:var(--saffron-light);border-color:var(--saffron);color:var(--saffron)}
.tag-pill.quality-tag{border-color:#97C459;color:var(--green)}
.tag-pill.quality-tag:hover{background:var(--green-light)}
.tag-pill.quality-tag.selected{background:var(--green-light);border-color:var(--green);color:var(--green)}
.tag-pill.custom-tag{border-style:dashed;border-color:var(--gold);color:#7A5800}
.tag-pill.custom-tag.selected{background:#FFF8E1;border-style:solid;border-color:var(--gold)}
.tag-prefix{font-size:10px;opacity:0.7}
.sel-count{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:var(--saffron);color:#fff;font-size:10px;font-weight:800;margin-left:5px}
.sel-count.hidden{display:none}
.no-tags-msg{font-size:13px;color:var(--text-soft);text-align:center;padding:16px;background:var(--bg);border-radius:10px}

/* REVIEW */
.review-box{background:linear-gradient(135deg,#F0FFF6,#E8F5EE);border:2px solid #97C459;border-radius:var(--radius);padding:16px;margin-top:4px}
.review-lang-label{font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.review-text{font-size:14px;line-height:1.75;color:var(--text);min-height:80px}
.review-dots{display:flex;justify-content:center;gap:6px;margin:11px 0 5px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all 0.2s}
.dot.active{background:var(--green);transform:scale(1.3)}
.btn-copy{width:100%;padding:15px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:11px}
.btn-copy:hover{background:#155e38}
.btn-copy.copied{background:var(--gold);color:#fff}
.btn-google{width:100%;padding:14px;border-radius:var(--radius);border:2px solid var(--border);background:var(--white);color:var(--text);font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:9px;text-decoration:none;transition:all 0.2s}
.btn-google:hover{border-color:#4285F4;color:#4285F4}

/* STATES */
.loading{text-align:center;padding:70px 20px}
.spinner{width:46px;height:46px;border:4px solid var(--border);border-top-color:var(--saffron);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:70px 20px}
.error-icon{font-size:46px;margin-bottom:14px}
.error-title{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;margin-bottom:7px}
.error-msg{font-size:14px;color:var(--text-soft)}
.footer{text-align:center;padding:18px;font-size:12px;color:var(--text-soft)}
.footer a{color:var(--saffron);text-decoration:none;font-weight:700}
</style>
</head>
<body>

<div id="loadingState" class="loading">
  <div class="spinner"></div>
  <p style="color:var(--text-soft);font-size:14px">Loading your review page...</p>
</div>

<div id="errorState" class="error-box" style="display:none">
  <div class="error-icon">😔</div>
  <div class="error-title" id="errorTitle">Something went wrong</div>
  <p class="error-msg" id="errorMsg">Please try again.</p>
</div>

<div id="mainContent" style="display:none">

  <div class="header">
    <div class="brand">⭐ GoodReview</div>
    <div class="business-name" id="hBusinessName"></div>
    <div class="business-sub" id="hBusinessSub"></div>
    <div class="stars-row">★★★★★</div>
  </div>

  <!-- LANGUAGE CARD -->
  <div class="card" id="langCard">
    <div class="section-title"><span class="icon">🌐</span>Select your language</div>
    <div class="lang-grid" id="langGrid"></div>
    <span class="lang-skip" onclick="skipLanguage()">Skip — use a random language</span>
  </div>

  <!-- TAGS CARD -->
  <div class="card" id="tagsCard">
    <div class="section-title">
      <span class="icon">🏷️</span>What did you experience?
      <span class="sel-count hidden" id="selCount">0</span>
    </div>
    <div class="tags-wrap" id="allTagsWrap"></div>
  </div>

  <!-- REVIEW CARD -->
  <div class="card" id="reviewCard" style="display:none">
    <div class="section-title"><span class="icon">✍️</span>Your Review</div>
    <div id="langBadge" class="lang-badge locked"></div>
    <div class="review-box">
      <div class="review-lang-label" id="reviewLangLabel"></div>
      <div class="review-text" id="reviewText"></div>
      <div class="review-dots" id="reviewDots"></div>
    </div>
    <button class="btn-copy" id="copyBtn" onclick="copyReview()">📋 Copy Review</button>
    <a class="btn-google" id="googleBtn" href="#" target="_blank">
      <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Post on Google Maps
    </a>
  </div>

  <div class="footer">Powered by <a href="https://goodreview.in">GoodReview.in</a></div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────
let business = null
let tagMaster = null
let selectedLang = null          // null = auto (random per version)
let langLocked = false           // true = user explicitly picked a language
let selectedTags = []            // [{id, label, type, ...}] — visitor's picks
let currentVersionIdx = 0
let reviewVersions = []

const LANG_DISPLAY = {
  English:'English', Hindi:'हिंदी', Gujarati:'ગુજરાતી', Hinglish:'Hinglish',
  Marathi:'मराठी', Tamil:'தமிழ்', Telugu:'తెలుగు', Kannada:'ಕನ್ನಡ'
}

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  const id = new URLSearchParams(window.location.search).get('id')
  if (!id) return showError('Invalid Link', 'No business ID in URL.')
  try {
    const [bizRes, tmRes] = await Promise.all([
      fetch('/api/business?id=' + id),
      fetch('/public/tag-master.json')
    ])
    if (!bizRes.ok) {
      const e = await bizRes.json()
      if (e.error === 'expired' || e.error === 'inactive')
        return showError('Subscription Expired', `${e.businessName || ''} — Please contact the business owner.`)
      if (e.error === 'free_limit_reached')
        return showError('Review Limit Reached', 'This business has reached its free plan limit.')
      return showError('Not Found', 'This review page does not exist.')
    }
    business = await bizRes.json()
    tagMaster = await tmRes.json()
    renderPage()
  } catch(e) {
    showError('Connection Error', 'Please check your internet and try again.')
  }
}

// ── RENDER PAGE ───────────────────────────────────────────────────
function renderPage() {
  document.getElementById('hBusinessName').textContent = business.businessName
  const sub = [business.subCategory, business.qualification].filter(Boolean).join(' · ')
  document.getElementById('hBusinessSub').textContent = sub
  document.title = 'Review — ' + business.businessName
  renderLanguages()
  renderTags()
  document.getElementById('loadingState').style.display = 'none'
  document.getElementById('mainContent').style.display  = 'block'
}

// ── LANGUAGE ──────────────────────────────────────────────────────
function renderLanguages() {
  const grid = document.getElementById('langGrid')
  grid.innerHTML = ''
  business.languages.forEach(lang => {
    const btn = document.createElement('button')
    btn.className = 'lang-btn'
    btn.textContent = LANG_DISPLAY[lang] || lang
    btn.dataset.lang = lang
    btn.onclick = () => pickLanguage(lang)
    grid.appendChild(btn)
  })
}

function pickLanguage(lang) {
  selectedLang = lang
  langLocked   = true
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('selected', b.dataset.lang === lang)
  )
  refreshReview()
}

function skipLanguage() {
  selectedLang = null
  langLocked   = false
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'))
  refreshReview()
}

// Returns a language for a given version index
function getLangForVersion(versionIdx) {
  if (langLocked && selectedLang) return selectedLang
  // Auto: rotate through owner's selected languages
  const langs = business.languages
  return langs[versionIdx % langs.length] || 'English'
}

// ── TAGS ──────────────────────────────────────────────────────────
function renderTags() {
  const wrap = document.getElementById('allTagsWrap')
  wrap.innerHTML = ''

  const tags = business.selectedTags || []

  if (tags.length === 0) {
    wrap.innerHTML = '<div class="no-tags-msg">No tags set up yet. Ask the business owner to configure their review page.</div>'
    return
  }

  tags.forEach((tag, i) => {
    const pill = document.createElement('div')
    const typeClass = tag.type === 'quality' ? 'quality-tag'
                    : tag.type === 'custom'  ? 'custom-tag'
                    : ''
    pill.className   = 'tag-pill ' + typeClass
    pill.dataset.idx = i
    pill.dataset.id  = tag.id   || ''
    pill.dataset.label = tag.label
    pill.dataset.type  = tag.type

    const prefix = tag.type === 'quality' ? '✓ '
                 : tag.type === 'custom'  ? '★ '
                 : ''
    pill.innerHTML = `<span class="tag-prefix">${prefix}</span>${tag.label}`
    pill.onclick   = () => toggleTag(pill, tag)
    wrap.appendChild(pill)
  })
}

function toggleTag(pill, tag) {
  const existingIdx = selectedTags.findIndex(t =>
    (t.id && t.id === tag.id) || (!t.id && t.label === tag.label)
  )
  if (existingIdx === -1) {
    selectedTags.push({ ...tag })
    pill.classList.add('selected')
  } else {
    selectedTags.splice(existingIdx, 1)
    pill.classList.remove('selected')
  }
  updateCount()
  refreshReview()
}

function updateCount() {
  const badge = document.getElementById('selCount')
  if (selectedTags.length > 0) {
    badge.textContent = selectedTags.length
    badge.classList.remove('hidden')
  } else {
    badge.classList.add('hidden')
  }
}

// ── PHRASE LOOKUP ─────────────────────────────────────────────────
function pick(arr) {
  return arr && arr.length ? arr[Math.floor(Math.random() * arr.length)] : null
}

function fromLMS(lms, size) {
  if (!lms) return null
  if (size === 'long')   return pick(lms.long)   || pick(lms.medium) || pick(lms.short) || null
  if (size === 'medium') return pick(lms.medium)  || pick(lms.long)  || pick(lms.short) || null
  return                        pick(lms.short)   || pick(lms.medium) || null
}

function getPhrase(tag, lang, size) {
  // Custom owner tag — use label as phrase
  if (tag.type === 'custom') return tag.label

  // Quality tag — look up in serviceQualityTags
  if (tag.type === 'quality') {
    const key = tag.id  // e.g. "Cleanliness"
    const lms = tagMaster.serviceQualityTags?.[key]?.phrases?.[lang]
             || tagMaster.serviceQualityTags?.[key]?.phrases?.English
    return fromLMS(lms, size) || tag.label
  }

  // Preset tag — find in category subcategories
  if (tag.type === 'preset') {
    const cat = tagMaster.categories?.[business.businessType]
    if (cat) {
      for (const sub of Object.values(cat.subcategories || {})) {
        const lms = sub.phrases?.[tag.id]?.[lang]
                 || sub.phrases?.[tag.id]?.English
        const r = fromLMS(lms, size)
        if (r) return r
      }
    }
    return tag.label
  }

  return tag.label
}

// ── BUILD REVIEW VERSIONS ─────────────────────────────────────────
function buildVersions() {
  const n    = selectedTags.length
  const SIZE = n === 1 ? 'long' : n === 2 ? 'medium' : 'short'
  const versions = []

  for (let v = 0; v < 5; v++) {
    const lang = getLangForVersion(v)

    // Opener
    let opener = ''
    if (v === 1 && business.area && business.city) {
      const arr = tagMaster.openers?.withLocation?.[lang]
               || tagMaster.openers?.withLocation?.English || []
      const tmpl = arr[Math.floor(Math.random() * arr.length)] || ''
      opener = tmpl
        .replace('{business}', business.businessName)
        .replace('{area}',     business.area)
        .replace('{city}',     business.city)
    } else {
      const arr = (tagMaster.openers?.withoutLocation?.[lang]
                || tagMaster.openers?.withoutLocation?.English || []).filter(s => s !== '')
      if (n > 1 && Math.random() < 0.4) opener = ''
      else opener = arr[v % arr.length] || ''
    }

    // Phrases
    const parts = selectedTags
      .map(tag => getPhrase(tag, lang, SIZE))
      .filter(Boolean)

    // Natural ending (1-2 tags only, ~60% chance)
    let ending = ''
    if (n <= 2 && Math.random() < 0.6) {
      const endArr = (tagMaster.naturalEndings?.[lang]
                   || tagMaster.naturalEndings?.English || []).filter(e => e !== '')
      ending = endArr[Math.floor(Math.random() * endArr.length)] || ''
    }

    // Assemble
    let review = opener
    parts.forEach((part, i) => {
      if (i === 0) {
        review += (review.endsWith(' ') || review === '') ? part : ' ' + part
      } else {
        const conn = n >= 3 ? ', ' : [', ', '. ', '! ', '— '][i % 4]
        review += conn + part
      }
    })

    if (review && !review.match(/[.।!—]$/) && !review.endsWith(' ')) review += '.'
    if (ending) review += ' ' + ending

    versions.push({ text: review.trim(), lang })
  }
  return versions
}

// ── REFRESH REVIEW ────────────────────────────────────────────────
function refreshReview() {
  if (selectedTags.length === 0) {
    document.getElementById('reviewCard').style.display = 'none'
    return
  }
  reviewVersions    = buildVersions()
  currentVersionIdx = 0
  renderVersion(0)
  document.getElementById('reviewCard').style.display = 'block'

  // Language badge
  const badge = document.getElementById('langBadge')
  if (langLocked && selectedLang) {
    badge.className = 'lang-badge locked'
    badge.innerHTML = '🔒 ' + (LANG_DISPLAY[selectedLang] || selectedLang)
  } else {
    badge.className = 'lang-badge auto'
    badge.innerHTML = '🔄 Rotating languages per version'
  }
}

function renderVersion(idx) {
  const v = reviewVersions[idx]
  document.getElementById('reviewText').textContent      = v.text
  document.getElementById('reviewLangLabel').textContent = LANG_DISPLAY[v.lang] || v.lang

  const dotsEl = document.getElementById('reviewDots')
  dotsEl.innerHTML = ''
  reviewVersions.forEach((_, i) => {
    const dot = document.createElement('div')
    dot.className = 'dot' + (i === idx ? ' active' : '')
    dot.onclick   = () => { currentVersionIdx = i; renderVersion(i) }
    dotsEl.appendChild(dot)
  })
}

// ── COPY & POST ───────────────────────────────────────────────────
async function copyReview() {
  const text = reviewVersions[currentVersionIdx]?.text
  if (!text) return

  try {
    await navigator.clipboard.writeText(text)
  } catch(e) {
    const ta = document.createElement('textarea')
    ta.value = text
    document.body.appendChild(ta)
    ta.select()
    document.execCommand('copy')
    document.body.removeChild(ta)
  }

  const btn = document.getElementById('copyBtn')
  btn.classList.add('copied')
  btn.innerHTML = '✅ Copied!'
  setTimeout(() => {
    btn.classList.remove('copied')
    btn.innerHTML = '📋 Copy Review'
  }, 2000)

  if (business.gmbUrl) document.getElementById('googleBtn').href = business.gmbUrl

  if (business.isFreePlan) {
    fetch('/api/increment-count', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ id: business.id })
    }).catch(() => {})
  }
}

// ── ERROR ─────────────────────────────────────────────────────────
function showError(title, msg) {
  document.getElementById('loadingState').style.display = 'none'
  document.getElementById('errorState').style.display   = 'block'
  document.getElementById('errorTitle').textContent     = title
  document.getElementById('errorMsg').textContent       = msg
}

init()
</script>
</body>
</html>

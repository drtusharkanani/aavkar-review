<style>
  :root {
    --teal: #0a7c6e;
    --teal-light: #0fa390;
    --teal-pale: #e8f7f5;
    --gold: #c9993a;
    --gold-light: #f5e6c8;
    --navy: #0d2340;
    --text: #1a2e3b;
    --muted: #6b8191;
    --white: #ffffff;
    --bg: #f4f9f8;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(10,124,110,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero {
    width: 100%;
    background: linear-gradient(145deg, var(--navy) 0%, #104a5e 60%, var(--teal) 100%);
    padding: 36px 20px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    top: -80px; right: -80px;
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(201,153,58,0.08);
    bottom: -60px; left: -40px;
    pointer-events: none;
  }
  .cross-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: var(--gold);
    border-radius: 50%;
    margin-bottom: 14px;
    font-size: 22px;
    position: relative; z-index: 1;
    box-shadow: 0 0 0 8px rgba(201,153,58,0.18);
  }
  .hospital-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 5vw, 28px);
    color: #fff;
    letter-spacing: 0.3px;
    line-height: 1.2;
    position: relative; z-index: 1;
  }
  .hospital-sub {
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2.5px;
    margin: 5px 0 2px;
    font-weight: 500;
    position: relative; z-index: 1;
  }
  .divider-gold {
    width: 48px; height: 2px;
    background: var(--gold);
    margin: 12px auto 12px;
    border-radius: 2px;
    position: relative; z-index: 1;
  }
  .doctor-card {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50px;
    padding: 8px 18px 8px 10px;
    margin-top: 4px;
    position: relative; z-index: 1;
    backdrop-filter: blur(6px);
  }
  .doctor-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white; font-size: 13px;
    flex-shrink: 0;
  }
  .doctor-info { text-align: left; }
  .doctor-name-text { font-size: 13px; font-weight: 600; color: #fff; }
  .doctor-title-text { font-size: 10.5px; color: rgba(255,255,255,0.65); margin-top: 1px; }
  .hero-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 12px;
    position: relative; z-index: 1;
  }
  .hero-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.3px;
  }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 20px;
    width: calc(100% - 32px);
    max-width: 480px;
    margin: -20px auto 0;
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    position: relative;
    z-index: 2;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .tags-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tag {
    padding: 8px 14px;
    border-radius: 50px;
    border: 1.5px solid #d4e8e5;
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: var(--teal);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .tag:hover { background: var(--teal-pale); border-color: var(--teal); }
  .tag.active {
    background: var(--teal);
    border-color: var(--teal);
    color: #fff;
    box-shadow: 0 2px 12px rgba(10,124,110,0.28);
    transform: translateY(-1px);
  }
  .tag .emoji { font-size: 15px; }
  .tag.info-tag {
    border-color: var(--gold);
    color: #8a6010;
    background: var(--gold-light);
  }
  .tag.info-tag.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
    box-shadow: 0 2px 12px rgba(201,153,58,0.35);
  }
  .review-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .review-label span { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 600; }
  .char-count { font-size: 11px; color: var(--muted); }
  .lang-badge {
    display: none;
    font-size: 10.5px;
    font-weight: 600;
    background: var(--gold-light);
    color: #8a6010;
    border: 1px solid #e8c87a;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  textarea {
    width: 100%;
    min-height: 130px;
    border: 1.5px solid #d4e8e5;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
    background: #fafdfc;
  }
  textarea:focus { border-color: var(--teal); background: #fff; }
  textarea::placeholder { color: #b0c4be; }
  .submit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 18px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 16px rgba(10,124,110,0.30);
    text-decoration: none;
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(10,124,110,0.38); }
  .submit-btn:active { transform: translateY(0); }
  .hint { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
  .qr-section {
    margin: 16px auto 0;
    width: calc(100% - 32px);
    max-width: 480px;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 20px;
    text-align: center;
    animation: fadeUp 0.4s ease 0.1s both;
  }
  .qr-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--navy); margin-bottom: 4px; }
  .qr-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  #qrcode { display: inline-block; padding: 12px; background: white; border-radius: 10px; border: 1.5px solid #d4e8e5; }
  #qrcode img, #qrcode canvas { border-radius: 6px; }
  .qr-url { font-size: 11px; color: var(--teal); margin-top: 10px; word-break: break-all; }
  .not-found {
    text-align: center;
    padding: 60px 24px;
    max-width: 380px;
    margin: 40px auto;
  }
  .not-found .icon { font-size: 48px; margin-bottom: 16px; }
  .not-found h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--navy); margin-bottom: 10px; }
  .not-found p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: white;
    padding: 12px 22px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  footer { text-align: center; font-size: 11px; color: #aac3be; padding: 20px 16px 32px; }
</style>
</head>

</div>

  <div class="qr-title">Share This Page</div>

<footer id="footerText">Powered by GoodReview Team · goodreview.in</footer>
<div class="toast" id="toast"></div>

<script>
const params   = new URLSearchParams(window.location.search);
const doctorId = params.get('id') || '101';
let DOC        = null;

async function loadDoctor() {
  try {
    document.getElementById('heroDoctorName').textContent  = 'Loading...';
    document.getElementById('heroHospitalName').textContent = 'GoodReview';
    const res  = await fetch('/api/doctor?id=' + doctorId);
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 403) { showExpired(); return; }
      showNotFound(); return;
    }
    DOC = {
      name: data.name, degree: data.degree, specialty: data.specialty,
      city: data.city, area: data.area, hospital: data.hospital,
      plan: data.plan, gmb: data.gmbUrl, customTags: data.customTags || [],
      reviewCount: data.reviewCount || 0, rating: data.rating || 0,
      referralCode: data.referralCode,
    };
    initApp();
  } catch(err) {
    console.error('Load error:', err);
    DOC = FALLBACK_DOCTORS[doctorId];
    if (DOC) { initApp(); } else { showNotFound(); }
  }
}

function showNotFound() {
  document.getElementById('mainCard').innerHTML = '<div class="not-found"><div class="icon">🏥</div><h2>Doctor Not Found</h2><p>No doctor found with ID <strong>' + doctorId + '</strong>.<br>Please check the link or QR code.</p></div>';
  document.querySelector('.hero').style.display = 'none';
  document.querySelector('.qr-section').style.display = 'none';
}

function showExpired() {
  document.getElementById('mainCard').innerHTML = '<div class="not-found"><div class="icon">⏰</div><h2>Subscription Expired</h2><p>This doctor\'s GoodReview subscription has expired.<br>Please contact the doctor to renew.</p></div>';
  document.querySelector('.hero').style.display = 'none';

function getTagsForDoctor(doc) {
  const specialtyTags = SPECIALTY_TAGS[doc.specialty] || [];
  const customTags = (doc.customTags || []).map(t => ({
    key: 'custom_' + t.label.toLowerCase().replace(/\s+/g, '_'),
    emoji: t.emoji || '🏷️', label: t.label, custom: true
  }));
  return [...QUALITY_TAGS, ...specialtyTags, ...customTags];
}

function initApp() {
  const initials = DOC.name.split(' ').filter(w => w.match(/[A-Z]/)).slice(-2).map(w => w[0]).join('');
  document.getElementById('heroHospital').textContent      = DOC.hospital;
  document.getElementById('heroHospitalName').textContent  = DOC.hospital;
  document.getElementById('heroAvatar').textContent        = initials || 'DR';
  document.getElementById('heroDoctorName').textContent    = DOC.name;
  document.getElementById('heroDoctorTitle').textContent   = DOC.degree + ' · ' + DOC.specialty;
  document.getElementById('footerText').textContent        = DOC.hospital + ' · ' + DOC.city;

  const badgesEl = document.getElementById('heroBadges');
  let badgesHTML = '<span class="hero-badge">🎓 ' + DOC.degree + '</span><span class="hero-badge">📍 ' + DOC.city + (DOC.area ? ', ' + DOC.area : '') + '</span>';
  if (DOC.rating && parseFloat(DOC.rating) > 0) {
    badgesHTML += '<span class="hero-badge" style="background:rgba(201,153,58,0.25);border-color:#c9993a;">⭐ ' + parseFloat(DOC.rating).toFixed(1) + ' Google Rating</span>';
  }
  badgesEl.innerHTML = badgesHTML;

  if (DOC.plan === 'free') {
    const used = parseInt(DOC.reviewCount) || 0;
    const limit = 3;
    const left = Math.max(0, limit - used);
    const pct = Math.min(100, (used / limit) * 100);
    const color = left === 0 ? '#e74c3c' : left === 1 ? '#e67e22' : '#0a7c6e';
    const banner = document.createElement('div');
    banner.style.cssText = 'margin:12px 16px 0;background:white;border-radius:12px;padding:12px 14px;border:1.5px solid ' + color + ';';
    banner.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:12px;font-weight:700;color:' + color + ';">' + (left === 0 ? '🔒 Free plan limit reached' : '⚡ Free Plan — ' + left + ' review' + (left > 1 ? 's' : '') + ' remaining') + '</span><span style="font-size:11px;color:#aaa;">' + used + '/' + limit + '</span></div><div style="height:6px;background:#f0f0f0;border-radius:3px;"><div style="width:' + pct + '%;height:100%;background:' + color + ';border-radius:3px;"></div></div>' + (left === 0 ? '<div style="font-size:11px;color:#e74c3c;margin-top:6px;text-align:center;">Upgrade to continue → <a href="https://goodreview.in/register.html" style="color:#0a7c6e;font-weight:700;">Upgrade Now</a></div>' : '');
    document.getElementById('mainCard').before(banner);
    if (left === 0) {
      setTimeout(() => {
        const btn = document.getElementById('submitBtn');
        if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; btn.style.cursor = 'not-allowed'; document.getElementById('submitBtnText').textContent = '🔒 Free limit reached — Upgrade plan'; }
      }, 500);
    }
  }

  const grid = document.getElementById('tagsGrid');
  grid.innerHTML = '';
  const degTag = document.createElement('div');
  degTag.className = 'tag info-tag'; degTag.dataset.tag = 'degree';
  degTag.innerHTML = '<span class="emoji">🎓</span> ' + DOC.degree;
  grid.appendChild(degTag);
  const cityTag = document.createElement('div');
  cityTag.className = 'tag info-tag'; cityTag.dataset.tag = 'city';
  cityTag.innerHTML = '<span class="emoji">📍</span> ' + DOC.city + (DOC.area ? ' · ' + DOC.area : '');
  grid.appendChild(cityTag);

  getTagsForDoctor(DOC).forEach(t => {
    const el = document.createElement('div');
    el.className = t.custom ? 'tag info-tag' : 'tag';
    el.dataset.tag = t.key; el.dataset.label = t.label;
    el.innerHTML = '<span class="emoji">' + t.emoji + '</span> ' + t.label;
    grid.appendChild(el);
  });

  let selectedTags = [];
  document.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      tag.classList.toggle('active');
      const t = tag.dataset.tag;
      if (selectedTags.includes(t)) { selectedTags = selectedTags.filter(x => x !== t); }
      else { selectedTags.push(t); }
      generateReview(selectedTags);
    });
  });

  const pageURL = window.location.href.split('#')[0];
  document.getElementById('pageUrl').textContent = pageURL;
  new QRCode(document.getElementById('qrcode'), {
    text: pageURL, width: 160, height: 160,
    colorDark: "#0d2340", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M
  });

  function getReviewUrl(rawUrl) {
    if (!rawUrl) return '';
    if (rawUrl.includes('search.google.com/local/writereview')) {
      const base = rawUrl.split('&text=')[0];
      return base.includes('laa=') ? base : base + '&source=g.page.m._&laa=merchant-review-solicitation';
    }
    const gPageMatch = rawUrl.match(/g\.page\/r\/([A-Za-z0-9_-]+)/);
    if (gPageMatch) return 'https://g.page/r/' + gPageMatch[1] + '/review';
    const placeIdMatch = rawUrl.match(/placeid=([A-Za-z0-9_-]+)/);
    if (placeIdMatch) return 'https://search.google.com/local/writereview?placeid=' + placeIdMatch[1] + '&source=g.page.m._&laa=merchant-review-solicitation';
    return rawUrl;
  }

  document.getElementById('submitBtn').addEventListener('click', function() {
    const text = document.getElementById('reviewBox').value.trim();
    if (!text) { showToast('⚠️ Please select tags or write a review first'); return; }
    copyToClipboard(text);
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('submitBtnText');
    const hint = document.getElementById('submitHint');
    btn.style.background = 'linear-gradient(135deg, #27ae60, #1e8449)';
    btnText.textContent = '✅ Copied! Now Paste on Google';
    hint.textContent = 'Opening Google in 2 seconds...';
    hint.style.color = '#27ae60'; hint.style.fontWeight = '600';
    setTimeout(() => {
      window.open(getReviewUrl(DOC.gmb), '_blank');
      if (DOC.plan === 'free') {
        fetch('/api/increment-count', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ doctorId })
        }).catch(e => console.log('Count error:', e));
      }
      setTimeout(() => {
        btn.style.background = '';
        btnText.textContent = 'Copy Review for Google';
        hint.textContent = 'Tap to copy → Google opens → Long press & Paste ✓';
        hint.style.color = ''; hint.style.fontWeight = '';
      }, 1000);
    }, 2000);
  });
}

const langKeys = ['english','hindi','hinglish','gujarati'];
let lastLangIndex = -1;
function pickLang(t) { let i; do { i = Math.floor(Math.random() * langKeys.length); } while (i === lastLangIndex); lastLangIndex = i; return t[langKeys[i]]; }
function rand(a) { return a[Math.floor(Math.random() * a.length)]; }

function generateReview(selectedTags) {
  const reviewBox = document.getElementById('reviewBox');
  if (!DOC || selectedTags.length === 0) { reviewBox.value = ''; document.getElementById('langBadge').style.display = 'none'; updateCount(); return; }
  const templates = buildTemplates(DOC);
  const lang = pickLang(templates);
  const base = rand(lang.base);
  const closing = rand(lang.closing);
  const phrases = selectedTags.map(t => {
    if (lang.phrases[t]) return lang.phrases[t];
    const tagEl = document.querySelector('[data-tag="' + t + '"]');
    if (tagEl) return DOC.name + ' provided excellent care for ' + (tagEl.dataset.label || tagEl.textContent.trim());
    return null;
  }).filter(Boolean);
  if (phrases.length === 0) { reviewBox.value = base + ' ' + closing; }
  else if (phrases.length === 1) { reviewBox.value = base + ' ' + phrases[0].charAt(0).toUpperCase() + phrases[0].slice(1) + '. ' + closing; }
  else if (phrases.length <= 3) { const j = phrases.slice(0,-1).join(', ') + ', and ' + phrases[phrases.length-1]; reviewBox.value = base + ' ' + j.charAt(0).toUpperCase() + j.slice(1) + '. ' + closing; }
  else { const h = Math.ceil(phrases.length/2); reviewBox.value = base + ' ' + phrases.slice(0,h).join(', ').charAt(0).toUpperCase() + phrases.slice(0,h).join(', ').slice(1) + '. Also, ' + phrases.slice(h).join(', ') + '. ' + closing; }
  const badge = document.getElementById('langBadge');
  badge.textContent = lang.label; badge.style.display = 'inline-block';
  updateCount();
}

const reviewBox = document.getElementById('reviewBox');
function updateCount() { document.getElementById('charCount').textContent = reviewBox.value.length + ' / 500'; }
reviewBox.addEventListener('input', updateCount);

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).catch(() => fallbackCopy(text)); }
  else { fallbackCopy(text); }
}
function fallbackCopy(text) {
  try { const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); } catch(e) {}
}
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

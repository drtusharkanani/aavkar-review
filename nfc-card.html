<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoodReview — NFC Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;font-family:'Poppins',sans-serif;min-height:100vh;padding:30px 20px 60px;color:#fff}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:14px;letter-spacing:4px;text-transform:uppercase;color:#F5A623;margin-bottom:6px}
.header p{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:1px}
.biz-bar{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:16px 20px;max-width:680px;margin:0 auto 28px;display:flex;align-items:center;gap:14px}
.biz-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#FF6B00,#F5A623);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.biz-name{font-size:14px;font-weight:700}
.biz-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.design-tabs{display:flex;gap:6px;max-width:680px;margin:0 auto 24px;flex-wrap:wrap;justify-content:center}
.dtab{padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;letter-spacing:0.5px}
.dtab:hover{border-color:rgba(255,255,255,0.4);color:#fff}
.dtab.active{color:#000;border-color:transparent}
.card-section{max-width:680px;margin:0 auto 20px}
.side-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);text-align:center;margin-bottom:8px}
.canvas-wrap{display:flex;justify-content:center;margin-bottom:6px}
canvas{border-radius:14px;display:block;max-width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
.dl-row{display:flex;gap:10px;justify-content:center;margin-top:14px}
.dl-btn{padding:10px 22px;border-radius:10px;border:none;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.2s}
.dl-front{background:linear-gradient(135deg,#FF6B00,#F5A623);color:#fff}
.dl-back{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff}
.dl-all{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-size:11px}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,0.3)}
.spinner{width:40px;height:40px;border:3px solid rgba(255,165,0,0.2);border-top-color:#F5A623;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{text-align:center;padding:40px;color:#E24B4A;font-size:13px}
.spec-note{text-align:center;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:0.5px;margin-top:8px}
</style>
</head>
<body>

<div class="header">
  <h1>⭐ GoodReview NFC Card</h1>
  <p>Print-ready · 1004 × 638 px · 300 DPI · 85.5 × 54 mm</p>
</div>

<div id="loadingDiv" class="loading">
  <div class="spinner"></div>
  <p>Loading business data...</p>
</div>

<div id="errDiv" class="err" style="display:none"></div>

<div id="mainDiv" style="display:none">
  <div class="biz-bar">
    <div class="biz-avatar" id="bizInitials">GR</div>
    <div>
      <div class="biz-name" id="bizName">Business</div>
      <div class="biz-sub" id="bizSub">Loading...</div>
    </div>
  </div>

  <div class="design-tabs" id="designTabs">
    <button class="dtab active" onclick="selectDesign(0)" id="dt0" style="background:#F5A623;color:#000">1 · Black &amp; Gold</button>
    <button class="dtab" onclick="selectDesign(1)" id="dt1">2 · Navy &amp; Silver</button>
    <button class="dtab" onclick="selectDesign(2)" id="dt2">3 · Forest &amp; Copper</button>
    <button class="dtab" onclick="selectDesign(3)" id="dt3">4 · White &amp; Saffron</button>
    <button class="dtab" onclick="selectDesign(4)" id="dt4">5 · Purple &amp; Champagne</button>
  </div>

  <div class="card-section">
    <div class="side-lbl">▼ FRONT</div>
    <div class="canvas-wrap"><canvas id="frontCanvas" width="1004" height="638"></canvas></div>
    <div class="side-lbl" style="margin-top:20px">▼ BACK</div>
    <div class="canvas-wrap"><canvas id="backCanvas" width="1004" height="638"></canvas></div>
    <div class="dl-row">
      <button class="dl-btn dl-front" onclick="downloadCard('front')">⬇ Download Front JPG</button>
      <button class="dl-btn dl-back" onclick="downloadCard('back')">⬇ Download Back JPG</button>
    </div>
    <div class="dl-row">
      <button class="dl-btn dl-all" onclick="downloadBoth()">⬇ Download Both (Front + Back)</button>
    </div>
    <div class="spec-note">1004 × 638 px · JPG 95% quality · Ready for print at 300 DPI</div>
  </div>
</div>

<script>
// ── DESIGNS ──────────────────────────────────────────────────────
const DESIGNS = [
  { name:'White & Gold',        bg:'#FFFFFF',    bg2:'#FFFBF2',   acc:'#C8860A', acc2:'#A06800', text:'#1A1A2E', textSoft:'rgba(26,26,46,0.45)' },
  { name:'Cream & Navy',        bg:'#F5F7FF',    bg2:'#EDF0FF',   acc:'#1A3A6B', acc2:'#122850', text:'#1A1A2E', textSoft:'rgba(26,26,46,0.45)' },
  { name:'Mint & Forest',       bg:'#F2FAF5',    bg2:'#E6F5EC',   acc:'#1A6B3A', acc2:'#125028', text:'#1A1A2E', textSoft:'rgba(26,26,46,0.45)' },
  { name:'White & Saffron',     bg:'#FFFFFF',    bg2:'#F7F3EE',   acc:'#FF6B00', acc2:'#D45500', text:'#1A1A2E', textSoft:'rgba(26,26,46,0.45)' },
  { name:'Lavender & Plum',     bg:'#F8F5FF',    bg2:'#F0EBFF',   acc:'#5B2D8E', acc2:'#421F6A', text:'#1A1A2E', textSoft:'rgba(26,26,46,0.45)' },
]

// ── STATE ──────────────────────────────────────────────────────
let biz = null
let qrImg = null
let currentDesign = 0
let fontsLoaded = false

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search)
  const id = params.get('id')
  const d  = parseInt(params.get('design') || '0')
  currentDesign = isNaN(d) ? 0 : Math.min(4, Math.max(0, d))

  if (!id) { showErr('No business ID. Use ?id=101'); return }

  try {
    const r = await fetch('/api/business?id=' + id)
    if (!r.ok) throw new Error('Business not found')
    biz = await r.json()


  // ── DATA RESOLUTION: B → A → Preset ─────────────────────────
  // B: Live from Airtable (already fetched as biz)
  // A: From localStorage session (edit.html saved data)
  // Preset: Category-based defaults

  const CATEGORY_DEFAULTS = {
    doctor_health:        { tagline: 'Trusted Healthcare, Close to Home',        tap: 'Tap to share your experience' },
    beauty_wellness:      { tagline: 'Look Good, Feel Great',                    tap: 'Tap to rate your experience' },
    food_drinks:          { tagline: 'Good Food, Great Memories',                 tap: 'Tap to leave a review' },
    hotel_stay:           { tagline: 'Comfort & Hospitality, Always',             tap: 'Tap to share your stay' },
    automobile:           { tagline: 'Trusted Auto Care, Every Time',             tap: 'Tap to rate our service' },
    home_services:        { tagline: 'Reliable Service for Your Home',            tap: 'Tap to share feedback' },
    education_learning:   { tagline: 'Shaping Futures, One Student at a Time',   tap: 'Tap to leave a review' },
    finance_legal:        { tagline: 'Trusted Financial Guidance',                tap: 'Tap to share your experience' },
    events_entertainment: { tagline: 'Making Every Occasion Special',             tap: 'Tap to rate our work' },
    real_estate:          { tagline: 'Your Trusted Property Partner',             tap: 'Tap to leave a review' },
    bank_loan:            { tagline: 'Banking on Trust, Every Day',               tap: 'Tap to share feedback' },
    insurance:            { tagline: 'Protecting What Matters Most',              tap: 'Tap to rate our service' },
    retail_services:      { tagline: 'Quality Products, Honest Prices',          tap: 'Tap to share your experience' },
    home_services:        { tagline: 'Reliable Service for Your Home',            tap: 'Tap to share feedback' },
    default:              { tagline: 'Quality Service, Every Time',               tap: 'Tap to share your experience' },
  }

  // Try to get session data from localStorage (Option A)
  let sessionBiz = null
  try {
    const raw = localStorage.getItem('gr_edit_v3') || sessionStorage.getItem('gr_edit_v3')
    if (raw) {
      const s = JSON.parse(raw)
      if (s?.business?.ownerId == id) sessionBiz = s.business
    }
  } catch(_) {}

  const catDefaults = CATEGORY_DEFAULTS[biz.businessType] || CATEGORY_DEFAULTS.default

  // Resolve each field: B (Airtable) → A (session) → Preset
  // Prefix logic — use Prefix field from Airtable
  // Options: Dr. / Mr. / Mrs. / Miss / Ms. / Prof. / CA / Adv. / None / ''
  const rawName   = biz.ownerName || sessionBiz?.ownerName || 'Business Owner'
  const prefixVal = biz.prefix || sessionBiz?.prefix || ''
  const KNOWN_PREFIXES = ['Dr.','Mr.','Mrs.','Miss','Ms.','Prof.','CA','Adv.']
  const alreadyHasPrefix = KNOWN_PREFIXES.some(p => rawName.startsWith(p))

  let displayPrefix = ''
  if (prefixVal && prefixVal !== 'None' && !alreadyHasPrefix) {
    displayPrefix = prefixVal.endsWith('.') || prefixVal === 'Miss' ? prefixVal + ' ' : prefixVal + ' '
  } else if (!prefixVal && biz.businessType === 'doctor_health' && !alreadyHasPrefix) {
    displayPrefix = 'Dr. ' // fallback for doctor_health if no prefix set
  }

  biz._ownerName = displayPrefix + rawName
  biz._bizName    = biz.businessName  || sessionBiz?.businessName  || 'My Business'
  biz._tagline    = biz.tagline       || sessionBiz?.tagline       || catDefaults.tagline
  biz._tapText    = catDefaults.tap
  biz._city       = biz.city          || sessionBiz?.city          || ''
  biz._qrUrl      = `https://goodreview.in/review.html?id=${id}`

    // Load QR code image
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(biz._qrUrl)}&bgcolor=ffffff&color=000000&qzone=1`
    qrImg = await loadImg(qrUrl)

    await document.fonts.ready
    fontsLoaded = true

    // Populate business bar
    const initials = (biz.ownerName || 'GR').replace(/Dr\./i,'').trim().split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()
    document.getElementById('bizInitials').textContent = initials
    document.getElementById('bizName').textContent     = biz._bizName || biz.businessName || '—'
    document.getElementById('bizSub').textContent      = [biz._ownerName, biz._city].filter(Boolean).join(' · ')

    hide('loadingDiv'); show('mainDiv')
    selectDesign(currentDesign)

  } catch(e) {
    showErr(e.message || 'Failed to load business data')
  }
}

function loadImg(url) {
  return new Promise((res, rej) => {
    const img = new Image(); img.crossOrigin = 'anonymous'
    img.onload = () => res(img)
    img.onerror = () => rej(new Error('Image load failed: ' + url))
    img.src = url
  })
}

// ── DESIGN SELECTION ─────────────────────────────────────────────
function selectDesign(i) {
  currentDesign = i
  DESIGNS.forEach((d, idx) => {
    const btn = document.getElementById('dt' + idx)
    if (idx === i) {
      btn.classList.add('active')
      btn.style.background = d.acc
      btn.style.color = d.bg === '#FFFFFF' ? '#1A1A2E' : '#fff'
      btn.style.borderColor = 'transparent'
    } else {
      btn.classList.remove('active')
      btn.style.background = ''
      btn.style.color = ''
      btn.style.borderColor = ''
    }
  })
  renderCards()
}

// ── RENDER ──────────────────────────────────────────────────────
function renderCards() {
  const d = DESIGNS[currentDesign]
  drawFront(document.getElementById('frontCanvas'), d)
  drawBack(document.getElementById('backCanvas'), d)
}

function drawFront(canvas, d) {
  const ctx = canvas.getContext('2d')
  const W = 1004, H = 638

  // Background
  const grad = ctx.createLinearGradient(0, 0, W, H)
  grad.addColorStop(0, d.bg); grad.addColorStop(1, d.bg2)
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H)

  // Top + bottom accent bars
  const barGrad = ctx.createLinearGradient(0, 0, W, 0)
  barGrad.addColorStop(0, d.acc2); barGrad.addColorStop(0.5, d.acc); barGrad.addColorStop(1, d.acc2)
  ctx.fillStyle = barGrad; ctx.fillRect(0, 0, W, 6)
  ctx.fillStyle = barGrad; ctx.fillRect(0, H-6, W, 6)

  // Vertical divider
  ctx.fillStyle = hexAlpha(d.acc, 0.18); ctx.fillRect(620, 80, 1, H-160)

  // Subtle radial glow on right
  const glow = ctx.createRadialGradient(870, H/2, 0, 870, H/2, 220)
  glow.addColorStop(0, hexAlpha(d.acc, 0.12)); glow.addColorStop(1, 'transparent')
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H)

  // ── LEFT SIDE ─────────────────────────────────────
  let y = 90

  // Brand row
  ctx.font = '600 20px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.fillText('⭐', 60, y)
  ctx.font = '700 18px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.letterSpacing = '3px'
  ctx.fillText('GOODREVIEW', 95, y)
  ctx.letterSpacing = '0px'
  y += 52

  // Owner name
  const ownerName = biz._ownerName || biz.ownerName || 'Business Owner'
  const parts = ownerName.split(' ')
  const line1 = parts.slice(0, Math.ceil(parts.length/2)).join(' ')
  const line2 = parts.slice(Math.ceil(parts.length/2)).join(' ')
  ctx.font = '800 52px "Playfair Display", serif'
  ctx.fillStyle = d.text
  ctx.fillText(line1, 60, y); y += 58
  if (line2) { ctx.fillText(line2, 60, y); y += 56 }

  // Business name
  ctx.font = '700 20px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.letterSpacing = '2px'
  const bizName = (biz._bizName || biz.businessName || '').toUpperCase()
  ctx.fillText(bizName.length > 24 ? bizName.slice(0,24)+'…' : bizName, 60, y)
  ctx.letterSpacing = '0px'
  y += 36

  // Tagline
  const tagline = biz._tagline || biz.tagline || 'Trusted Quality Service'
  ctx.font = 'italic 400 22px Georgia, serif'
  ctx.fillStyle = hexAlpha(d.text, 0.65)
  ctx.fillText(tagline.length > 36 ? tagline.slice(0,36)+'…' : tagline, 60, y)
  y += 56

  // Divider line
  ctx.fillStyle = hexAlpha(d.acc, 0.25); ctx.fillRect(60, y-10, 200, 1)
  y += 16

  // Tap instruction
  ctx.font = '800 24px Poppins, sans-serif'
  ctx.fillStyle = d.text
  ctx.fillText('📡  ' + (biz._tapText || 'Tap to share your experience'), 60, y); y += 30
  ctx.font = '600 16px Poppins, sans-serif'
  ctx.fillStyle = hexAlpha(d.text, 0.7)
  ctx.letterSpacing = '1.5px'
  ctx.fillText('TAKES ONLY 30 SECONDS', 88, y)
  ctx.letterSpacing = '0px'

  // Card ID bottom left
  ctx.font = '400 14px Poppins, sans-serif'
  ctx.fillStyle = hexAlpha(d.text, 0.18)
  ctx.fillText(`goodreview.in · id:${biz.id}`, 60, H - 22)

  // ── RIGHT SIDE — NFC ZONE ─────────────────────────
  const cx = 808, cy = H / 2

  // Pulsing rings (static)
  for (let r = 60; r <= 160; r += 40) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2)
    ctx.strokeStyle = hexAlpha(d.acc, 0.5 - (r-60)/200)
    ctx.lineWidth = r === 60 ? 2 : 1.5
    ctx.stroke()
  }

  // NFC circle
  const nfcGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 55)
  nfcGrad.addColorStop(0, hexAlpha(d.acc, 0.25)); nfcGrad.addColorStop(1, hexAlpha(d.acc, 0.08))
  ctx.beginPath(); ctx.arc(cx, cy, 55, 0, Math.PI*2)
  ctx.fillStyle = nfcGrad; ctx.fill()
  ctx.strokeStyle = hexAlpha(d.acc, 0.6); ctx.lineWidth = 2; ctx.stroke()

  // NFC icon
  ctx.font = '42px sans-serif'
  ctx.textAlign = 'center'
  ctx.fillText('📲', cx, cy + 16)
  ctx.textAlign = 'left'

  // Tap to Review label
  ctx.font = '700 18px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.textAlign = 'center'
  ctx.letterSpacing = '2px'
  ctx.fillText('TAP TO REVIEW', cx, cy + 90)
  ctx.letterSpacing = '0px'
  ctx.font = '500 14px Poppins, sans-serif'
  ctx.fillStyle = hexAlpha(d.text, 0.7)
  ctx.fillText('Your feedback helps others', cx, cy + 115)
  ctx.fillText('find trusted service', cx, cy + 134)
  ctx.textAlign = 'left'

  // Google + Stars
  ctx.textAlign = 'center'
  ctx.font = '700 16px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.fillText('G  ★ ★ ★ ★ ★', cx, cy - 100)
  ctx.textAlign = 'left'
}

function drawBack(canvas, d) {
  const ctx = canvas.getContext('2d')
  const W = 1004, H = 638

  // Background
  const grad = ctx.createLinearGradient(0, H, W, 0)
  grad.addColorStop(0, d.bg2); grad.addColorStop(1, d.bg)
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H)

  // Bars
  const barGrad = ctx.createLinearGradient(0, 0, W, 0)
  barGrad.addColorStop(0, d.acc2); barGrad.addColorStop(0.5, d.acc); barGrad.addColorStop(1, d.acc2)
  ctx.fillStyle = barGrad; ctx.fillRect(0, 0, W, 6)
  ctx.fillStyle = barGrad; ctx.fillRect(0, H-6, W, 6)

  // Divider
  ctx.fillStyle = hexAlpha(d.acc, 0.18); ctx.fillRect(530, 80, 1, H-160)

  // ── LEFT SIDE — QR (larger, no label above) ─────────────────
  const qcx = 265

  // QR frame — bigger, starts higher
  const qSize = 320, qx = qcx - qSize/2, qy = (638 - 320) / 2 - 30
  ctx.fillStyle = '#fff'
  roundRect(ctx, qx-14, qy-14, qSize+28, qSize+28, 18)
  ctx.fill()

  // Accent corners on QR frame
  const cc = d.acc, cw = 28, cs = 5
  ;[
    [qx-14, qy-14], [qx+qSize-cw+14, qy-14],
    [qx-14, qy+qSize-cw+14], [qx+qSize-cw+14, qy+qSize-cw+14]
  ].forEach(([px, py], i) => {
    ctx.strokeStyle = cc; ctx.lineWidth = cs; ctx.lineCap = 'round'
    ctx.beginPath()
    if (i===0) { ctx.moveTo(px+cw,py); ctx.lineTo(px,py); ctx.lineTo(px,py+cw) }
    else if (i===1) { ctx.moveTo(px,py); ctx.lineTo(px+cw,py); ctx.lineTo(px+cw,py+cw) }
    else if (i===2) { ctx.moveTo(px,py+cw); ctx.lineTo(px,py); ctx.lineTo(px+cw,py) }
    else { ctx.moveTo(px+cw,py+cw); ctx.lineTo(px+cw,py); ctx.lineTo(px,py) }
    ctx.stroke()
  })

  // Draw QR image
  if (qrImg) ctx.drawImage(qrImg, qx, qy, qSize, qSize)

  // URL below QR — dark, readable
  ctx.font = '700 18px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.textAlign = 'center'
  ctx.fillText('Scan to Review', qcx, qy + qSize + 44)
  ctx.font = '400 12px Poppins, sans-serif'
  ctx.fillStyle = hexAlpha(d.text, 0.7)
  ctx.fillText(biz._qrUrl.replace('https://',''), qcx, qy + qSize + 64)
  ctx.textAlign = 'left'

  // ── RIGHT SIDE — STEPS ───────────────────────────
  const rx = 570
  let ry = 80

  // Brand
  const boxSize = 46
  drawRoundRect(ctx, rx, ry-boxSize+8, boxSize, boxSize, 12, d.acc)
  ctx.font = '700 22px sans-serif'
  ctx.textAlign = 'center'
  ctx.fillStyle = '#fff'
  ctx.fillText('⭐', rx + boxSize/2, ry + 4)
  ctx.textAlign = 'left'
  ctx.font = '800 24px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.fillText('GoodReview', rx + boxSize + 14, ry + 2)
  ry += 62

  // Steps label — dark
  ctx.font = '600 13px Poppins, sans-serif'
  ctx.fillStyle = hexAlpha(d.text, 0.8)
  ctx.letterSpacing = '2px'
  ctx.fillText('HOW TO LEAVE A REVIEW', rx, ry)
  ctx.letterSpacing = '0px'
  ry += 34

  // 3 steps only — removed "Select your language"
  const steps = [
    'Scan QR code or tap NFC card',
    'Pick your experience tags',
    'Copy review & post on Google Maps'
  ]
  steps.forEach((s, i) => {
    // Number circle
    ctx.beginPath(); ctx.arc(rx+14, ry-7, 14, 0, Math.PI*2)
    ctx.fillStyle = hexAlpha(d.acc, 0.15); ctx.fill()
    ctx.strokeStyle = d.acc; ctx.lineWidth = 1.5; ctx.stroke()
    ctx.font = '800 14px Poppins, sans-serif'
    ctx.fillStyle = d.acc
    ctx.textAlign = 'center'
    ctx.fillText(i+1, rx+14, ry-2)
    ctx.textAlign = 'left'

    ctx.font = '600 18px Poppins, sans-serif'
    ctx.fillStyle = d.text  // full dark
    ctx.fillText(s, rx+40, ry-1)
    ry += 52
  })

  // Google G + Stars
  ry += 14
  ctx.font = '700 22px Poppins, sans-serif'
  ctx.fillStyle = d.acc
  ctx.fillText('G  ★★★★★', rx, ry)
  ry += 28
  ctx.font = '400 14px Poppins, sans-serif'
  ctx.fillStyle = hexAlpha(d.text, 0.6)
  ctx.fillText('Powered by Google Reviews', rx, ry)

  // URL bottom
  ctx.font = '400 12px Poppins, sans-serif'
  ctx.fillStyle = hexAlpha(d.text, 0.55)
  ctx.fillText(biz._qrUrl.replace('https://',''), rx, H - 22)
}

// ── HELPERS ──────────────────────────────────────────────────────
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16)
  const g = parseInt(hex.slice(3,5),16)
  const b = parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${alpha})`
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y)
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r)
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h)
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r)
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath()
}

function drawRoundRect(ctx, x, y, w, h, r, fill) {
  roundRect(ctx, x, y, w, h, r)
  ctx.fillStyle = fill; ctx.fill()
}

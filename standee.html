<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoodReview — Standee Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:'Poppins',sans-serif;min-height:100vh;padding:24px 16px 60px}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#FF6B00;margin-bottom:4px}
.header p{font-size:12px;color:#888}
.biz-bar{background:#fff;border-radius:14px;padding:14px 18px;max-width:420px;margin:0 auto 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.biz-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FF6B00,#F5A623);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.biz-name{font-size:13px;font-weight:700;color:#1A1A2E}
.biz-sub{font-size:11px;color:#888;margin-top:1px}
.preview-section{max-width:420px;margin:0 auto}
.preview-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#888;text-align:center;margin-bottom:10px}
.standee-wrap{display:flex;justify-content:center;margin-bottom:16px}
canvas#standeeCanvas{border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.15);display:block;max-width:100%}
.no-photo-msg{background:#FFF3E8;border:1.5px solid #FFD4A8;border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#B85C00;margin-bottom:16px;display:none}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-dl{padding:11px 24px;border-radius:12px;border:none;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:linear-gradient(135deg,#FF6B00,#F5A623);color:#fff}
.btn-secondary{background:#1A1A2E;color:#fff}
.btn-disabled{background:#e0e0e0;color:#999;cursor:not-allowed}
.upgrade-note{text-align:center;font-size:12px;color:#888;margin-top:8px}
.upgrade-note a{color:#FF6B00;font-weight:700;text-decoration:none}
.loading{text-align:center;padding:50px}
.spinner{width:40px;height:40px;border:3px solid rgba(255,107,0,0.2);border-top-color:#FF6B00;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{text-align:center;padding:40px;color:#E24B4A;font-size:13px}
.spec-note{text-align:center;font-size:10px;color:#aaa;margin-top:8px}
</style>
</head>
<body>

<div class="header">
  <h1>⭐ GoodReview Standee</h1>
  <p>Print-ready · 10 × 7 cm · 300 DPI</p>
</div>

<div id="loadingDiv" class="loading">
  <div class="spinner"></div>
  <p style="color:#888;font-size:13px">Loading...</p>
</div>

<div id="errDiv" class="err" style="display:none"></div>

<div id="mainDiv" style="display:none">
  <div class="biz-bar">
    <div class="biz-avatar" id="bizInitials">GR</div>
    <div>
      <div class="biz-name" id="bizName">Business</div>
      <div class="biz-sub" id="bizSub"></div>
    </div>
  </div>

  <div class="preview-section">
    <div class="preview-label">Preview</div>
    <div id="noPhotoMsg" class="no-photo-msg">
      ⚠️ Please upload your profile photo in <a href="edit.html" style="color:#FF6B00;font-weight:700">Edit Profile</a> first to generate your standee.
    </div>
    <div class="standee-wrap">
      <canvas id="standeeCanvas" width="827" height="1181"></canvas>
    </div>
    <div class="btn-row">
      <button id="dlBtn" class="btn-dl btn-primary" onclick="downloadStandee()">⬇ Download Standee JPG</button>
    </div>
    <div id="upgradeNote" class="upgrade-note" style="display:none">
      Download available on <strong>Ultimate</strong> plan. <a href="register.html">Upgrade →</a>
    </div>
    <div class="spec-note">827 × 1181 px · JPG 95% · Print at 300 DPI = 7 × 10 cm</div>
  </div>
</div>

<script>
const GOOGLE_COLORS = ['#4285F4','#EA4335','#FBBC05','#34A853']

let biz = null
let ownerImg = null
let qrImg = null
let isUltimate = false

async function init() {
  const params = new URLSearchParams(window.location.search)
  const id = params.get('id')
  if (!id) { showErr('No business ID. Use ?id=101'); return }

  try {
    const r = await fetch('/api/business?id=' + id)
    if (!r.ok) throw new Error('Business not found')
    biz = await r.json()

    const plan = (biz.plan || '').trim()
    isUltimate = plan.startsWith('ultimate')

    // Biz bar
    const initials = (biz.ownerName || 'GR').replace(/Dr\./i,'').trim().split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()
    document.getElementById('bizInitials').textContent = initials
    document.getElementById('bizName').textContent = biz.businessName || biz.ownerName || '—'
    document.getElementById('bizSub').textContent = [biz.ownerName, biz.city].filter(Boolean).join(' · ')

    // QR code
    const reviewUrl = `https://goodreview.in/review.html?id=${id}`
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(reviewUrl)}&bgcolor=ffffff&color=000000&qzone=1`
    qrImg = await loadImg(qrUrl)

    // Profile photo
    if (biz.photoUrl) {
      try { ownerImg = await loadImg(biz.photoUrl) } catch(_) { ownerImg = null }
    }

    await document.fonts.ready

    hide('loadingDiv')
    show('mainDiv')

    if (!biz.photoUrl) {
      document.getElementById('noPhotoMsg').style.display = 'block'
    }

    // Download button state
    const dlBtn = document.getElementById('dlBtn')
    if (!isUltimate) {
      dlBtn.className = 'btn-dl btn-disabled'
      dlBtn.onclick = null
      document.getElementById('upgradeNote').style.display = 'block'
    }

    drawStandee()

  } catch(e) {
    showErr(e.message || 'Failed to load')
  }
}

function loadImg(url) {
  return new Promise((res, rej) => {
    const img = new Image(); img.crossOrigin = 'anonymous'
    img.onload = () => res(img)
    img.onerror = () => rej(new Error('Image failed: ' + url))
    img.src = url
  })
}

function drawStandee() {
  const canvas = document.getElementById('standeeCanvas')
  const ctx    = canvas.getContext('2d')
  const W = 827, H = 1181

  // White background
  ctx.fillStyle = '#ffffff'
  ctx.fillRect(0, 0, W, H)

  // Light grey border
  ctx.strokeStyle = '#e0e0e0'
  ctx.lineWidth = 3
  ctx.strokeRect(1.5, 1.5, W-3, H-3)

  // ── Profile photo or placeholder ──────────────────────────────
  const photoSize = 260
  const photoCX   = W / 2
  const photoCY   = 200

  ctx.save()
  ctx.beginPath()
  ctx.arc(photoCX, photoCY, photoSize/2, 0, Math.PI*2)
  ctx.clip()

  if (ownerImg) {
    // Draw image fitted in circle
    const scale = Math.max(photoSize / ownerImg.width, photoSize / ownerImg.height)
    const iw = ownerImg.width * scale, ih = ownerImg.height * scale
    ctx.drawImage(ownerImg, photoCX - iw/2, photoCY - ih/2, iw, ih)
  } else {
    // Placeholder
    ctx.fillStyle = '#f0f0f0'
    ctx.fillRect(photoCX - photoSize/2, photoCY - photoSize/2, photoSize, photoSize)
    ctx.fillStyle = '#bbb'
    ctx.font = '80px sans-serif'
    ctx.textAlign = 'center'
    ctx.fillText('👤', photoCX, photoCY + 28)
  }
  ctx.restore()

  // Circle border
  ctx.beginPath()
  ctx.arc(photoCX, photoCY, photoSize/2 + 4, 0, Math.PI*2)
  ctx.strokeStyle = '#e8e8e8'
  ctx.lineWidth = 4
  ctx.stroke()

  // ── Name ──────────────────────────────────────────────────────
  const KNOWN_PFX = ['Dr.','Mr.','Mrs.','Miss','Ms.','Prof.','CA','Adv.']
  const hasPrefix = KNOWN_PFX.some(p => (biz.ownerName||'').startsWith(p))
  let displayName = biz.ownerName || ''
  if (!hasPrefix && biz.prefix && biz.prefix !== 'None') {
    displayName = biz.prefix + ' ' + displayName
  } else if (!hasPrefix && !biz.prefix && biz.businessType === 'doctor_health') {
    displayName = 'Dr. ' + displayName
  }

  ctx.textAlign = 'center'
  ctx.fillStyle = '#1565C0'
  ctx.font = '700 52px Poppins, sans-serif'
  ctx.fillText(displayName, W/2, photoCY + photoSize/2 + 70)

  // ── SubCategory ───────────────────────────────────────────────
  const sub = (biz.subCategory || '').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase())
  ctx.fillStyle = '#333'
  ctx.font = '600 36px Poppins, sans-serif'
  ctx.fillText(sub, W/2, photoCY + photoSize/2 + 120)

  // ── City ──────────────────────────────────────────────────────
  if (biz.city) {
    ctx.fillStyle = '#666'
    ctx.font = '400 30px Poppins, sans-serif'
    ctx.fillText(biz.city, W/2, photoCY + photoSize/2 + 162)
  }

  // ── QR Code with Google color border ──────────────────────────
  const qrSize  = 340
  const qrX     = W/2 - qrSize/2
  const qrY     = photoCY + photoSize/2 + 200
  const borderW = 14
  const segLen  = qrSize / 4

  // Draw 4 colored border segments (top, right, bottom, left) — Google colors
  // Top
  ctx.strokeStyle = GOOGLE_COLORS[0]; ctx.lineWidth = borderW
  ctx.beginPath(); ctx.moveTo(qrX, qrY); ctx.lineTo(qrX + qrSize, qrY); ctx.stroke()
  // Right
  ctx.strokeStyle = GOOGLE_COLORS[1]
  ctx.beginPath(); ctx.moveTo(qrX + qrSize, qrY); ctx.lineTo(qrX + qrSize, qrY + qrSize); ctx.stroke()
  // Bottom
  ctx.strokeStyle = GOOGLE_COLORS[2]
  ctx.beginPath(); ctx.moveTo(qrX + qrSize, qrY + qrSize); ctx.lineTo(qrX, qrY + qrSize); ctx.stroke()
  // Left
  ctx.strokeStyle = GOOGLE_COLORS[3]
  ctx.beginPath(); ctx.moveTo(qrX, qrY + qrSize); ctx.lineTo(qrX, qrY); ctx.stroke()

  // QR image
  if (qrImg) ctx.drawImage(qrImg, qrX + borderW, qrY + borderW, qrSize - borderW*2, qrSize - borderW*2)

  // ── SCAN ME label ─────────────────────────────────────────────
  const scanY = qrY + qrSize + 36
  ctx.fillStyle = '#1A1A2E'
  ctx.font = '800 34px Poppins, sans-serif'
  ctx.textAlign = 'center'
  ctx.fillText('SCAN ME', W/2, scanY)

  // ── Review us on Google + Stars ───────────────────────────────
  const reviewY = scanY + 56
  ctx.font = '500 28px Poppins, sans-serif'
  ctx.fillStyle = '#444'
  ctx.fillText('Review us on', W/2, reviewY)

  // Google text with colors
  const googleY = reviewY + 52
  const gText = 'Google'
  ctx.font = '700 44px Poppins, sans-serif'
  const gColors = ['#4285F4','#EA4335','#FBBC05','#4285F4','#34A853','#EA4335']
  const gLetters = gText.split('')
  const totalW = ctx.measureText(gText).width
  let gx = W/2 - totalW/2
  gLetters.forEach((l, i) => {
    ctx.fillStyle = gColors[i]
    ctx.fillText(l, gx, googleY)
    gx += ctx.measureText(l).width
  })

  // Stars
  const starY = googleY + 52
  ctx.font = '48px sans-serif'
  ctx.fillStyle = '#FBBC05'
  ctx.fillText('★★★★★', W/2, starY)

  // ── GoodReview branding bottom ────────────────────────────────
  ctx.font = '400 22px Poppins, sans-serif'
  ctx.fillStyle = '#bbb'
  ctx.fillText('Powered by GoodReview.in', W/2, H - 28)
}

function downloadStandee() {
  if (!isUltimate) return
  const canvas = document.getElementById('standeeCanvas')
  const name   = (biz.businessName || 'standee').toLowerCase().replace(/\s+/g,'-')
  const link   = document.createElement('a')
  link.href     = canvas.toDataURL('image/jpeg', 0.95)
  link.download = `standee-${name}-id${biz.id}.jpg`
  link.click()
}

function show(id) { document.getElementById(id).style.display = 'block' }
function hide(id) { document.getElementById(id).style.display = 'none' }
function showErr(msg) { hide('loadingDiv'); const e = document.getElementById('errDiv'); e.textContent = '❌ ' + msg; e.style.display = 'block' }

init()
</script>
</body>
</html>
